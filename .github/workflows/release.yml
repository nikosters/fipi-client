name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare release signing
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p android/app
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_RELEASE_STORE_PASSWORD
          keyPassword=$ANDROID_RELEASE_KEY_PASSWORD
          keyAlias=$ANDROID_RELEASE_KEY_ALIAS
          storeFile=app/release.jks
          EOF

      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build APK
        run: flutter build apk --release --build-name "$VERSION" --build-number "$GITHUB_RUN_NUMBER"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "fipi_client-$VERSION.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "fipi_client-$VERSION.apk" \
            --title "fipi_client $GITHUB_REF_NAME" \
            --notes ""
